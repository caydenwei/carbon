name: carbon-local

x-supabase-env: &supabase-env
  SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
  SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvY2FsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDE0MjQsImV4cCI6MjA5NTQwMTQyNH0.sKbKu3moiwneWuKgB2uCmG1DiR_3d2rkKf-kaLQNiFs}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvY2FsIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MDA0MTQyNCwiZXhwIjoyMDk1NDAxNDI0fQ.sg2ppATIUgRyTKJQYgQdOJa9qQYy85Yr4hMGBn4oDWM}

x-app-env: &app-env
  <<: *supabase-env
  NODE_ENV: production
  AUTH_PROVIDERS: ${AUTH_PROVIDERS:-email}
  CARBON_EDITION: ${CARBON_EDITION:-community}
  DEV_BYPASS_EMAIL: ${DEV_BYPASS_EMAIL:-admin@carbon.local}
  SESSION_SECRET: ${SESSION_SECRET:-local-dev-session-secret-change-me}
  DOMAIN: localhost
  ERP_URL: http://localhost:3000
  MES_URL: http://localhost:3000
  VERCEL_URL: http://localhost:3000
  SUPABASE_URL: http://localhost:3000
  SUPABASE_DB_URL: postgresql://postgres:postgres@postgres:5432/postgres
  REDIS_URL: redis://redis:6379/0
  INNGEST_DEV: "1"
  INNGEST_BASE_URL: http://inngest:8288
  INNGEST_SERVE_HOST: http://localhost:3000
  POSTHOG_API_HOST: ${POSTHOG_API_HOST:-http://localhost:3000}
  POSTHOG_PROJECT_PUBLIC_KEY: ${POSTHOG_PROJECT_PUBLIC_KEY:-phc_local_disabled}
  RATE_LIMIT: ${RATE_LIMIT:-5}
  RESEND_API_KEY: ${RESEND_API_KEY:-re_local_disabled}
  RESEND_DOMAIN: ${RESEND_DOMAIN:-localhost}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
  CLOUDFLARE_TURNSTILE_SITE_KEY: ${CLOUDFLARE_TURNSTILE_SITE_KEY:-}
  CLOUDFLARE_TURNSTILE_SECRET_KEY: ${CLOUDFLARE_TURNSTILE_SECRET_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}

services:
  local-gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${CARBON_LOCAL_PORT:-3000}:3000"
    volumes:
      - ./packages/dev/docker/local-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      kong:
        condition: service_started

  erp:
    build:
      context: .
      dockerfile: apps/erp/Dockerfile
    restart: unless-stopped
    network_mode: service:local-gateway
    environment:
      <<: *app-env
      PORT: 3001
    depends_on:
      local-gateway:
        condition: service_started
      local-init:
        condition: service_completed_successfully

  local-init:
    build:
      context: .
      dockerfile: apps/erp/Dockerfile
      target: deps
    restart: "no"
    working_dir: /repo
    environment:
      <<: *app-env
      PGSSLMODE: disable
      SUPABASE_URL: http://kong:8000
      ERP_URL: http://local-gateway:3000
      VERCEL_URL: http://local-gateway:3000
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        cd /repo/packages/database
        node <<'NODE'
        const { Client } = require("pg");

        const deadline = Date.now() + 180_000;
        const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

        async function storageReady() {
          const client = new Client({
            connectionString: process.env.SUPABASE_DB_URL
          });
          try {
            await client.connect();
            const result = await client.query(`
              select
                to_regclass('storage.buckets') is not null as buckets,
                to_regclass('storage.objects') is not null as objects,
                to_regprocedure('storage.foldername(text)') is not null as foldername,
                to_regprocedure('storage.filename(text)') is not null as filename
            `);
            return Object.values(result.rows[0] ?? {}).every(Boolean);
          } catch {
            return false;
          } finally {
            await client.end().catch(() => {});
          }
        }

        async function main() {
          process.stdout.write("Waiting for Supabase storage schema");
          while (Date.now() < deadline) {
            if (await storageReady()) {
              process.stdout.write(" ready\n");
              return;
            }
            process.stdout.write(".");
            await sleep(1000);
          }

          process.stderr.write("\nSupabase storage schema did not become ready within 180s\n");
          process.exit(1);
        }

        main().catch((error) => {
          console.error(error);
          process.exit(1);
        });
        NODE
        pnpm exec supabase migration up --db-url postgresql://postgres:postgres@postgres:5432/postgres
        cd /repo
        pnpm --filter @carbon/database db:seed
        cd /repo/packages/database
        DEV_USER_COMPANIES="$(
          node <<'NODE'
        const { Client } = require("pg");

        const email = process.env.DEV_BYPASS_EMAIL;
        const client = new Client({
          connectionString: process.env.SUPABASE_DB_URL
        });

        client.connect()
          .then(() => client.query(
            `select count(*)::int as count
               from auth.users u
               join public."userToCompany" utc on utc."userId" = u.id::text
              where lower(u.email) = lower($1)`,
            [email]
          ))
          .then((result) => {
            process.stdout.write(String(result.rows[0]?.count ?? 0));
          })
          .finally(() => client.end())
          .catch((error) => {
            console.error(error);
            process.exit(1);
          });
        NODE
        )"
        cd /repo
        if [ "$${DEV_USER_COMPANIES}" = "0" ]; then
          pnpm --filter @carbon/database db:seed:dev -- --email "$${DEV_BYPASS_EMAIL}"
        else
          echo "Development login user $${DEV_BYPASS_EMAIL} already has a company; skipping dev seed."
        fi
    depends_on:
      postgres:
        condition: service_healthy
      kong:
        condition: service_started

  postgres:
    image: supabase/postgres:15.14.1.112
    restart: unless-stopped
    networks:
      default:
        aliases:
          - db
    environment:
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_PORT: 5432
      PGPORT: 5432
      POSTGRES_DB: postgres
      PGDATABASE: postgres
      POSTGRES_PASSWORD: postgres
      PGPASSWORD: postgres
      JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      JWT_EXP: 3600
    volumes:
      - local-pgdata:/var/lib/postgresql/data
      - local-pgconfig:/etc/postgresql-custom
      - ./packages/dev/docker/init.sql:/docker-entrypoint-initdb.d/zz-carbon-roles.sql:ro
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  gotrue:
    image: supabase/gotrue:v2.189.0
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: http://localhost:3000
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:postgres@postgres:5432/postgres
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_URI_ALLOW_LIST: http://localhost:3000
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_HOST: inbucket
      GOTRUE_SMTP_PORT: 2500
      GOTRUE_SMTP_ADMIN_EMAIL: admin@carbon.local
      GOTRUE_SMTP_SENDER_NAME: Carbon
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: "false"
      GOTRUE_EXTERNAL_AZURE_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy

  postgrest:
    image: postgrest/postgrest:v13.0.8
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:postgres@postgres:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_APP_SETTINGS_JWT_EXP: 3600

  realtime:
    image: supabase/realtime:v2.89.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      default:
        aliases:
          - realtime-dev
    environment:
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: postgres
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      METRICS_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      SECRET_KEY_BASE: UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq
      APP_NAME: realtime
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
      DISABLE_HEALTHCHECK_LOGGING: "true"

  storage:
    image: supabase/storage-api:v1.58.4
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvY2FsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDE0MjQsImV4cCI6MjA5NTQwMTQyNH0.sKbKu3moiwneWuKgB2uCmG1DiR_3d2rkKf-kaLQNiFs}
      SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvY2FsIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MDA0MTQyNCwiZXhwIjoyMDk1NDAxNDI0fQ.sg2ppATIUgRyTKJQYgQdOJa9qQYy85Yr4hMGBn4oDWM}
      POSTGREST_URL: http://postgrest:3000
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      DATABASE_URL: postgres://supabase_storage_admin:postgres@postgres:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "false"
    volumes:
      - local-storage:/var/lib/storage:z

  meta:
    image: supabase/postgres-meta:v0.96.5
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: postgres
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: postgres

  studio:
    image: supabase/studio:2026.04.28-sha-89d08a2
    restart: unless-stopped
    depends_on:
      meta:
        condition: service_started
    environment:
      HOSTNAME: 0.0.0.0
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: postgres
      DEFAULT_ORGANIZATION_NAME: Carbon
      DEFAULT_PROJECT_NAME: carbon-local
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: http://localhost:3000
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvY2FsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDE0MjQsImV4cCI6MjA5NTQwMTQyNH0.sKbKu3moiwneWuKgB2uCmG1DiR_3d2rkKf-kaLQNiFs}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvY2FsIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MDA0MTQyNCwiZXhwIjoyMDk1NDAxNDI0fQ.sg2ppATIUgRyTKJQYgQdOJa9qQYy85Yr4hMGBn4oDWM}

  inbucket:
    image: inbucket/inbucket:3.1.1
    restart: unless-stopped

  edge-runtime:
    image: supabase/edge-runtime:v1.74.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvY2FsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDE0MjQsImV4cCI6MjA5NTQwMTQyNH0.sKbKu3moiwneWuKgB2uCmG1DiR_3d2rkKf-kaLQNiFs}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvY2FsIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MDA0MTQyNCwiZXhwIjoyMDk1NDAxNDI0fQ.sg2ppATIUgRyTKJQYgQdOJa9qQYy85Yr4hMGBn4oDWM}
      SUPABASE_DB_URL: postgresql://postgres:postgres@postgres:5432/postgres
      VERIFY_JWT: "false"
    volumes:
      - ./packages/database/supabase/functions:/home/deno/functions:ro
      - ./packages/database/src:/home/src:ro
      - ./packages/dev/docker/edge-main:/home/deno/main:ro
    command:
      - start
      - --main-service
      - /home/deno/main

  kong:
    image: kong:2.8.1
    restart: unless-stopped
    depends_on:
      - gotrue
      - postgrest
      - realtime
      - storage
      - meta
      - edge-runtime
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
    volumes:
      - ./packages/dev/docker/kong.yml:/home/kong/kong.yml:ro

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - local-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  inngest:
    image: inngest/inngest:v1.19.4
    restart: unless-stopped
    command:
      - inngest
      - dev
      - --sdk-url=http://local-gateway:3000/api/inngest
    volumes:
      - local-inngest:/data

volumes:
  local-pgdata:
  local-pgconfig:
  local-storage:
  local-redis:
  local-inngest:
